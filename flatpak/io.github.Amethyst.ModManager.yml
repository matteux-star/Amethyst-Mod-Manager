app-id: io.github.Amethyst.ModManager
runtime: org.kde.Platform
runtime-version: "6.9"
sdk: org.kde.Sdk
# PySide6 comes prebuilt from the PySide BaseApp (Flathub-standard for
# PySide apps); Qt itself is shared from the KDE runtime.
base: io.qt.PySide.BaseApp
base-version: "6.9"

# 32-bit support for running Proton's bundled `wine` binary (ELF i386) during
# Synthesis prefix setup. Without these, exec'ing wine fails with ENOENT — the
# kernel reports the missing 32-bit ld-linux.so.2 interpreter as the error.
# NOTE: version 24.08 matches KDE 6.9's freedesktop base (was 25.08 on GNOME 50).
add-extensions:
  org.freedesktop.Platform.Compat.i386:
    directory: lib/i386-linux-gnu
    version: '24.08'
  org.freedesktop.Platform.GL32:
    directory: lib/i386-linux-gnu/GL
    version: '1.4'
    versions: 24.08;1.4
    subdirectories: true
    no-autodownload: false
    autodelete: false
    add-ld-path: lib

command: amethyst-mod-manager

build-options:
  env:
    # cleanup-BaseApp.sh knobs — the app only uses QtCore/QtGui/QtWidgets,
    # so strip the QtWebEngine stack the BaseApp inherits.
    BASEAPP_REMOVE_WEBENGINE: 'true'
    BASEAPP_DISABLE_NUMPY: 'true'

# Sandbox permissions
# - network: Nexus API send/receive, version checks, downloads
# - x11 + wayland sockets: Qt picks Wayland natively when the session offers
#   it and falls back to X11 otherwise.
# - dri: GPU rendering
# - home: mod staging (user-configurable path, e.g. anywhere in ~/), game paths, Steam libraries.
#   NOTE: app config does NOT live in ~/.config here — flatpak redirects
#   XDG_CONFIG_HOME, so it lands in ~/.var/app/<app-id>/config/AmethystModManager
#   (separate from a native/AppImage install's ~/.config/AmethystModManager).
# - run/media, media, mnt: Steam libraries on SD cards and removable drives (Steam Deck, etc.)
# - ~/.var/app/com.valvesoftware.Steam: Steam Flatpak data (home excludes ~/.var/app)
# - ~/.var/app/com.heroicgameslauncher.hgl: Heroic Flatpak
# - talk-name=org.freedesktop.secrets: keyring (Nexus API key storage and retrieval)
finish-args:
  - --share=network
  - --socket=x11
  - --socket=wayland
  - --device=dri
  - --share=ipc
  - --filesystem=home
  - --filesystem=/run/media
  - --filesystem=/media
  - --filesystem=/mnt
  - --filesystem=~/.var/app/com.valvesoftware.Steam
  - --filesystem=~/.var/app/com.heroicgameslauncher.hgl
  - --talk-name=org.freedesktop.secrets
  - --talk-name=org.freedesktop.Flatpak
  # Wine (Synthesis prefix setup) installs its own seccomp filter and runs
  # 32-bit binaries; the default sandbox blocks both, killing wine with SIGSYS.
  - --allow=multiarch

tags:
  - modmanager
  - games
  - modding

cleanup-commands:
  # BaseApp housekeeping (WebEngine strip per build-options env above).
  - /app/cleanup-BaseApp.sh
  # Mount points for the 32-bit compat extensions declared above.
  - mkdir -p /app/lib/i386-linux-gnu/GL

modules:
  # Python Dependencies (PySide6 excluded — provided by the BaseApp)
  - pypi-dependencies.yaml

  - name: sevenzip
    buildsystem: simple
    build-commands:
      - make -C CPP/7zip/Bundles/Alone2 -f makefile.gcc
      - install -Dm755 CPP/7zip/Bundles/Alone2/_o/7zz /app/bin/7zz
    sources:
      - type: archive
        url: https://github.com/ip7z/7zip/releases/download/25.01/7z2501-src.tar.xz
        mirror-urls:
          - https://www.7-zip.org/a/7z2501-src.tar.xz
        sha256: ed087f83ee789c1ea5f39c464c55a5c9d4008deb0efe900814f2df262b82c36e
        strip-components: 0
  - name: unrar
    buildsystem: simple
    build-commands:
      - make -f makefile
      - install -Dm755 unrar /app/bin/unrar
    sources:
      - type: archive
        url: https://www.rarlab.com/rar/unrarsrc-7.1.9.tar.gz
        sha256: cbb5c7b65b720e59ffa47b2d00b8d1022a961da7ae1db27b6986c43671719483

  # cabextract is needed by winetricks (vcredist/d3dcompiler installs).
  # Bundling it means Utils/protontricks.py finds it on PATH and never falls
  # back to downloading a rolling Arch binary that may not match our glibc.
  - name: cabextract
    buildsystem: autotools
    sources:
      - type: archive
        url: https://www.cabextract.org.uk/cabextract-1.11.tar.gz
        sha256: b5546db1155e4c718ff3d4b278573604f30dd64c3c5bfd4657cd089b823a3ac6

  - name: amethyst-mod-manager
    buildsystem: simple
    build-commands:
      - install -d /app/share/amethyst-mod-manager
      - cp -a src/run_qt.py src/cli.py src/app_bootstrap.py src/version.py src/gui_qt
        src/wizards_qt src/Utils src/Games src/LOOT src/Nexus src/icons src/wrappers
        src/gpak /app/share/amethyst-mod-manager/
      - cp Changelog.txt /app/share/amethyst-mod-manager/

      # Fail the build if src/LOOT lacks a loot.cpython-3XX .so matching the
      # runtime's Python ABI — otherwise LOOT sorting silently disables at
      # runtime. Rebuild with src/LOOT/rebuild_libloot.sh using the runtime's
      # Python version (3.12 on org.kde.Platform 6.9).
      - cd /app/share/amethyst-mod-manager && python3 -c 'import LOOT.loot'

      - install -d /app/bin
      - |
        printf '%s\n' '#!/bin/sh' \
          'export MOD_MANAGER_GAMES="/app/share/amethyst-mod-manager/Games"' \
          'export XDG_DATA_DIRS=/app/share:/usr/share' \
          'cd /app/share/amethyst-mod-manager' \
          'exec python3 run_qt.py "$@"' > /app/bin/amethyst-mod-manager
      - chmod +x /app/bin/amethyst-mod-manager
      - |
        printf '%s\n' '#!/bin/sh' \
          'export MOD_MANAGER_GAMES="/app/share/amethyst-mod-manager/Games"' \
          'export XDG_DATA_DIRS=/app/share:/usr/share' \
          'cd /app/share/amethyst-mod-manager' \
          'exec python3 cli.py "$@"' > /app/bin/amethyst-mod-manager-cli
      - chmod +x /app/bin/amethyst-mod-manager-cli
      - install -d /app/share/applications
      - install -m 644 flatpak/io.github.Amethyst.ModManager.desktop /app/share/applications/
      - install -d /app/share/icons/hicolor/64x64/apps /app/share/icons/hicolor/128x128/apps /app/share/icons/hicolor/256x256/apps
      - install -m 644 src/appimage/mod-manager.png /app/share/icons/hicolor/64x64/apps/io.github.Amethyst.ModManager.png
      - install -m 644 src/appimage/mod-manager.png /app/share/icons/hicolor/128x128/apps/io.github.Amethyst.ModManager.png
      - install -m 644 src/appimage/mod-manager.png /app/share/icons/hicolor/256x256/apps/io.github.Amethyst.ModManager.png
    sources:
      - type: dir
        path: ..
